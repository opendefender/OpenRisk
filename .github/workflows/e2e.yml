name: E2E Tests

# PR-blocking end-to-end tests (Playwright). Topology is fixed by the app: the
# frontend hardcodes its API base to :8080 and CORS defaults to :5173, so we run
# backend on :8080 + frontend dev on :5173 and drive the browser at :5173.
# Firefox/WebKit are reserved for the nightly job — a 25-min PR CI is a CI nobody
# uses.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # Nightly cross-browser + weekly onboarding guard (UX-33 runs every night too).
    - cron: '17 3 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== PR-BLOCKING E2E (chromium + Mobile Chrome) ============
  e2e:
    name: E2E (chromium + Mobile Chrome)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openrisk
          POSTGRES_PASSWORD: openrisk
          POSTGRES_DB: openrisk_e2e
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    env:
      # Backend
      DATABASE_URL: postgres://openrisk:openrisk@localhost:5432/openrisk_e2e?sslmode=disable
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: openrisk
      DB_PASSWORD: openrisk
      DB_NAME: openrisk_e2e
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      APP_ENV: test
      PORT: '8080'
      JWT_SECRET: e2e-secret-key-not-for-production
      CORS_ORIGINS: http://localhost:5173
      INITIAL_ADMIN_PASSWORD: admin123
      # E2E harness
      E2E_NO_WEBSERVER: '1'
      E2E_BASE_URL: http://localhost:5173
      E2E_API_URL: http://localhost:8080/api/v1
      E2E_ADMIN_EMAIL: admin@opendefender.io
      E2E_ADMIN_PASSWORD: admin123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Build backend
        run: cd backend && go build -o openrisk ./cmd/server

      - name: Start backend (:8080)
        run: |
          cd backend && ./openrisk &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/v1/health >/dev/null; then
              echo "✅ backend ready"; exit 0
            fi
            echo "waiting for backend ($i/60)"; sleep 1
          done
          echo "❌ backend failed to start"; exit 1

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Start frontend dev server (:5173)
        run: |
          npm --prefix frontend run dev -- --port 5173 --strictPort &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5173 >/dev/null; then echo "✅ frontend ready"; exit 0; fi
            echo "waiting for frontend ($i/30)"; sleep 1
          done
          echo "❌ frontend failed to start"; exit 1

      - name: Install E2E deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Run E2E (chromium + Mobile Chrome)
        run: npx playwright test --project=chromium --project="Mobile Chrome"

      - name: Route coverage → job summary
        if: always()
        run: node scripts/e2e-route-summary.mjs >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/.artifacts
          retention-days: 30

  # ==================== NIGHTLY CROSS-BROWSER (firefox + webkit) ==============
  e2e-crossbrowser:
    name: E2E nightly (firefox + webkit)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openrisk
          POSTGRES_PASSWORD: openrisk
          POSTGRES_DB: openrisk_e2e
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://openrisk:openrisk@localhost:5432/openrisk_e2e?sslmode=disable
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: openrisk
      DB_PASSWORD: openrisk
      DB_NAME: openrisk_e2e
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      APP_ENV: test
      PORT: '8080'
      JWT_SECRET: e2e-secret-key-not-for-production
      CORS_ORIGINS: http://localhost:5173
      INITIAL_ADMIN_PASSWORD: admin123
      E2E_NO_WEBSERVER: '1'
      E2E_CROSS_BROWSER: '1'
      E2E_BASE_URL: http://localhost:5173
      E2E_API_URL: http://localhost:8080/api/v1
      E2E_ADMIN_EMAIL: admin@opendefender.io
      E2E_ADMIN_PASSWORD: admin123

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Build & start backend
        run: |
          cd backend && go build -o openrisk ./cmd/server && ./openrisk &
          for i in $(seq 1 60); do curl -fsS http://localhost:8080/api/v1/health >/dev/null && break; sleep 1; done
      - name: Start frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run dev -- --port 5173 --strictPort &
          for i in $(seq 1 30); do curl -fsS http://localhost:5173 >/dev/null && break; sleep 1; done
      - name: Install E2E deps + browsers
        run: |
          npm ci
          npx playwright install --with-deps firefox webkit
      - name: Run nightly E2E (firefox + webkit)
        run: npx playwright test --project=firefox --project=webkit
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: tests/e2e/.artifacts
          retention-days: 14
