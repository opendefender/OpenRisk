      operationId: deleteBoardReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Report deleted.
        '404':
          description: Report not found.

