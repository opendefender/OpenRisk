openapi: 3.1.0
info:
  title: OpenRisk API
  version: 1.0.0
  description: |
    Modern, intelligent risk management platform API.
    Part of the OpenDefender suite with AI-driven risk assessment, mitigation tracking, and security integration.
    
    **Authentication**: All protected endpoints require a Bearer JWT token in the `Authorization` header.
    
    **Base URL**: `/api/v1`
  contact:
    name: OpenDefender Team
  license:
    name: Business Source License 1.1 (BUSL-1.1)
    url: https://mariadb.com/bsl11/
servers:
  - url: /api/v1
    description: Production API

tags:
  - name: Health
    description: Health check and status
  - name: Authentication
    description: Login and user management
  - name: Risks
    description: Risk management - create, read, update, delete risks
  - name: Mitigations
    description: Mitigation planning and tracking
  - name: Compliance
    description: Compliance frameworks, controls, and evidence (M1)
  - name: Assets
    description: Asset management
  - name: Statistics
    description: Dashboard and analytics
  - name: Export
    description: Data export
  - name: Gamification
    description: Gamification and user profiles

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      description: Check API health status
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  version:
                    type: string
                    example: 1.0.0
                  db:
                    type: string
                    example: CONNECTED

  # ==================== AUTHENTICATION ====================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== RISKS ====================
  /risks:
    get:
      tags:
        - Risks
      summary: List all risks
      operationId: listRisks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: sort_by
          in: query
          schema:
            type: string
            description: Field to sort by (e.g., score, title, impact)
      responses:
        '200':
          description: List of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Risk'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Risks
      summary: Create a new risk
      operationId: createRisk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRiskInput'
      responses:
        '201':
          description: Risk created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /risks/{id}:
    get:
      tags:
        - Risks
      summary: Get risk details
      operationId: getRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Risk UUID
      responses:
        '200':
          description: Risk details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

    patch:
      tags:
        - Risks
      summary: Update risk
      operationId: updateRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRiskInput'
      responses:
        '200':
          description: Risk updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

    delete:
      tags:
        - Risks
      summary: Delete risk
      operationId: deleteRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Risk deleted
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  # ==================== MITIGATIONS ====================
  /risks/{id}/mitigations:
    post:
      tags:
        - Mitigations
      summary: Add mitigation to risk
      operationId: addMitigation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Risk UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMitigationInput'
      responses:
        '201':
          description: Mitigation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /risks/{id}/financial:
    get:
      tags:
        - Financial Quantification
      summary: Full financial assessment for one risk
      description: >
        Returns the complete Cyber Risk Quantification for a risk (spec §9):
        SLE (explicit/composed/reference), downtime cost, worst/average loss,
        ALE (XAF+USD), remediation cost, residual ALE and ROSI.
      operationId: getRiskFinancial
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Financial assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialAssessment'
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /risks/{id}/simulate:
    post:
      tags:
        - Financial Quantification
      summary: What-if investment simulation (non-persisting)
      description: >
        Recomputes the financial assessment with the supplied overrides layered
        on the risk's stored drivers, WITHOUT persisting anything. Powers the
        CISO/CFO investment-scenario simulator.
      operationId: simulateRiskFinancial
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateFinancialInput'
      responses:
        '200':
          description: Simulated financial assessment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialAssessment'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /analytics/financial:
    get:
      tags:
        - Financial Quantification
      summary: Tenant-wide financial posture (CFO/CISO dashboard)
      description: >
        Portfolio ALE (current, worst-case, residual), remediation budget,
        portfolio ROSI, breakdown by criticality and the top financial exposures.
      operationId: getFinancialSummary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialSummary'
        '401':
          description: Unauthorized

  /risks/{id}/smart-score:
    get:
      tags:
        - Smart Risk Calculation
      summary: Multifactor smart risk score + breakdown
      description: >
        Computes (and caches on the risk) the multifactor "smart" risk score
        (spec §8): a 0–100 score blending business criticality, internet
        exposure, vulnerabilities/CVSS, control maturity, incident history,
        exploitability, financial value and live threat intel (CTI), each
        weighted by the tenant's configurable weights. Returns the radar-ready
        per-factor breakdown. The classic Score Engine (P × I × AC) is untouched.
      operationId: getRiskSmartScore
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Smart score with per-factor breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartRiskScore'
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /risks/{id}/smart-score/simulate:
    post:
      tags:
        - Smart Risk Calculation
      summary: Preview the smart score with custom weights (non-persisting)
      description: >
        Recomputes the smart score for a risk with the supplied factor weights
        WITHOUT persisting — powers the "tune the weighting live" simulator.
      operationId: simulateRiskSmartScore
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactorWeightsInput'
      responses:
        '200':
          description: Simulated smart score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartRiskScore'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /risk-scoring/weights:
    get:
      tags:
        - Smart Risk Calculation
      summary: Tenant's smart-risk factor weights
      description: >
        Returns the tenant's effective factor weights (custom or the built-in
        defaults) for the eight-factor multifactor model.
      operationId: getRiskScoringWeights
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Factor weights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScoringWeights'
        '401':
          description: Unauthorized
    put:
      tags:
        - Smart Risk Calculation
      summary: Update the tenant's factor weights (admin)
      description: >
        Persists the tenant's custom factor weights. Weights are relative (the
        engine normalises them); each must be in [0,1] and at least one > 0.
        Admin only.
      operationId: updateRiskScoringWeights
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactorWeightsInput'
      responses:
        '200':
          description: Updated weights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScoringWeights'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (admin only)

  /mitigations/{mitigationId}:
    patch:
      tags:
        - Mitigations
      summary: Update mitigation details
      operationId: updateMitigation
      security:
        - bearerAuth: []
      parameters:
        - name: mitigationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMitigationInput'
      responses:
        '200':
          description: Mitigation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  /mitigations/{mitigationId}/toggle:
    patch:
      tags:
        - Mitigations
      summary: Toggle mitigation status (PLANNED ↔ DONE)
      operationId: toggleMitigationStatus
      security:
        - bearerAuth: []
      parameters:
        - name: mitigationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  # ==================== MITIGATION SUB-ACTIONS ====================
  /mitigations/{id}/subactions:
    post:
      tags:
        - Mitigations
      summary: Create mitigation sub-action (checklist item)
      operationId: createMitigationSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubActionInput'
      responses:
        '201':
          description: Sub-action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MitigationSubAction'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  /mitigations/{id}/subactions/{subactionId}/toggle:
    patch:
      tags:
        - Mitigations
      summary: Toggle sub-action completed status
      operationId: toggleSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
        - name: subactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Sub-action UUID
      responses:
        '200':
          description: Sub-action toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MitigationSubAction'
        '401':
          description: Unauthorized
        '404':
          description: Sub-action not found

  /mitigations/{id}/subactions/{subactionId}:
    delete:
      tags:
        - Mitigations
      summary: Delete mitigation sub-action
      operationId: deleteSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
        - name: subactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Sub-action UUID
      responses:
        '204':
          description: Sub-action deleted
        '401':
          description: Unauthorized
        '404':
          description: Sub-action not found

  /mitigations/recommended:
    get:
      tags:
        - Mitigations
      summary: Get recommended mitigations (sorted by SPP score)
      operationId: getRecommendedMitigations
      responses:
        '200':
          description: Recommended mitigations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mitigation'

  # ==================== COMPLIANCE (M1) ====================
  /compliance/catalogs:
    get:
      tags: [Compliance]
      summary: List regulatory control catalogs available to import (M2)
      description: >
        Static reference data (e.g. ISO 27001:2022's 93 Annex A controls) that can be
        bulk-imported into a tenant's own framework via POST
        /compliance/frameworks/{frameworkId}/import-catalog. Includes catalogs that are
        registered but not yet available (control_count: 0, available: false) so clients can
        show them as "coming soon" — see ROADMAP.md M2 for why COBAC/BCEAO/ANSSI-CM aren't
        modeled yet.
      operationId: listComplianceCatalogs
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of catalogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceCatalogSummary'

  /compliance/frameworks/{frameworkId}/import-catalog:
    post:
      tags: [Compliance]
      summary: Bulk-import a regulatory catalog's controls into a framework (admin only, M2)
      description: >
        Idempotent — controls already present (matched by reference_code) are skipped, so
        calling this again after a catalog is extended only creates what's new.
      operationId: importComplianceCatalog
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportCatalogInput'
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCatalogResult'
        '400':
          description: Unknown catalog key, or the catalog is not yet available
        '403':
          description: Forbidden — only Admin can import a catalog (same tier as creating a framework)
        '404':
          description: Framework not found

  /compliance/frameworks:
    get:
      tags: [Compliance]
      summary: List global compliance frameworks
      operationId: listComplianceFrameworks
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceFramework'
    post:
      tags: [Compliance]
      summary: Create a global compliance framework (admin only)
      operationId: createComplianceFramework
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFrameworkInput'
      responses:
        '201':
          description: Framework created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceFramework'
        '400':
          description: Invalid input
        '403':
          description: Forbidden — only Admin can create a global framework
        '409':
          description: A framework with this name and version already exists

  /compliance/frameworks/{frameworkId}:
    get:
      tags: [Compliance]
      summary: Get a compliance framework
      operationId: getComplianceFramework
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Framework
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceFramework'
        '404':
          description: Framework not found
    delete:
      tags: [Compliance]
      summary: Delete a compliance framework
      description: >
        Removes the framework and the calling tenant's controls under it.
        Admin/root-only. Note the framework row is global — deleting it removes
        it for every tenant (a known multi-tenant limitation; in practice each
        tenant imports its own frameworks).
      operationId: deleteComplianceFramework
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Framework deleted
        '403':
          description: Insufficient permissions
        '404':
          description: Framework not found

  /compliance/frameworks/{frameworkId}/progress:
    get:
      tags: [Compliance]
      summary: Get a tenant's compliance progress for a framework
      operationId: getComplianceProgress
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProgress'

  /compliance/frameworks/{frameworkId}/report:
    get:
      tags: [Compliance]
      summary: Download an official compliance report (PDF) for a framework
      description: >
        Generates, in a single click, a print-ready PDF compliance report for the
        framework: cover identity (organization, framework, date, requester), an
        executive summary (compliance %, per-status breakdown) and a detailed,
        paginated controls table (reference, name, status, evidence count, source
        citation). All data is strictly tenant-scoped — the framework is global
        but only the requesting tenant's controls and evidence appear. Suitable
        for COBAC/BCEAO/ISO one-click statements.
      operationId: generateComplianceReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: locale
          in: query
          required: false
          description: Fixed-label language of the report. Defaults to French.
          schema: { type: string, enum: [fr, en], default: fr }
      responses:
        '200':
          description: The compliance report as a PDF attachment.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          description: Framework not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /compliance/frameworks/{frameworkId}/controls:
    get:
      tags: [Compliance]
      summary: List a tenant's controls for a framework
      operationId: listComplianceControls
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of controls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceControl'
    post:
      tags: [Compliance]
      summary: Instantiate a control for a tenant under this framework
      operationId: createComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateControlInput'
      responses:
        '201':
          description: Control created (status defaults to not_implemented)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '400':
          description: Invalid input
        '404':
          description: Framework not found
        '409':
          description: A control with this reference_code already exists for this tenant+framework

  /compliance/controls/{controlId}:
    get:
      tags: [Compliance]
      summary: Get a control
      operationId: getComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Control
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '404':
          description: Control not found
    patch:
      tags: [Compliance]
      summary: Update a control (notably its implementation status)
      operationId: updateComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateControlInput'
      responses:
        '200':
          description: Control updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '400':
          description: Invalid status value
        '404':
          description: Control not found
    delete:
      tags: [Compliance]
      summary: Delete a control (admin only)
      operationId: deleteComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Control deleted
        '403':
          description: Forbidden — Delete is admin-only
        '404':
          description: Control not found

  /compliance/controls/{controlId}/evidences:
    get:
      tags: [Compliance]
      summary: List evidence attached to a control
      operationId: listComplianceEvidences
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of evidence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ControlEvidence'
    post:
      tags: [Compliance]
      summary: Upload a file as evidence for a control
      operationId: createComplianceEvidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '201':
          description: Evidence uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlEvidence'
        '400':
          description: Missing file
        '404':
          description: Control not found

  /compliance/evidences/{evidenceId}/download:
    get:
      tags: [Compliance]
      summary: Download an evidence file
      description: |
        The only path to evidence file content — there is no public/static
        URL. Tenant ownership is re-verified on every call.
      operationId: downloadComplianceEvidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: evidenceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
