        owner:
          type: string
          example: "DBA Team"
        external_id:
          type: string
          example: "db-prod-001"

    UpdateAssetInput:
      type: object
      description: Partial update — omitted fields are left unchanged.
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [Server, Application, Cloud, Database, SaaS, Storage, Network, Laptop, Data, User, Supplier]
        criticality:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        owner:
          type: string

