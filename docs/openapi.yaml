openapi: 3.1.0
info:
  title: OpenRisk API
  version: 1.0.0
  description: |
    Modern, intelligent risk management platform API.
    Part of the OpenDefender suite with AI-driven risk assessment, mitigation tracking, and security integration.
    
    **Authentication**: All protected endpoints require a Bearer JWT token in the `Authorization` header.
    
    **Base URL**: `/api/v1`
  contact:
    name: OpenDefender Team
  license:
    name: Business Source License 1.1 (BUSL-1.1)
    url: https://mariadb.com/bsl11/
servers:
  - url: /api/v1
    description: Production API

tags:
  - name: Health
    description: Health check and status
  - name: Authentication
    description: Login and user management
  - name: Risks
    description: Risk management - create, read, update, delete risks
  - name: Mitigations
    description: Mitigation planning and tracking
  - name: Compliance
    description: Compliance frameworks, controls, and evidence (M1)
  - name: Assets
    description: Asset management
  - name: Statistics
    description: Dashboard and analytics
  - name: Export
    description: Data export
  - name: Gamification
    description: Gamification and user profiles

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: healthCheck
      description: Check API health status
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  version:
                    type: string
                    example: 1.0.0
                  db:
                    type: string
                    example: CONNECTED

  # ==================== AUTHENTICATION ====================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== RISKS ====================
  /risks:
    get:
      tags:
        - Risks
      summary: List all risks
      operationId: listRisks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: sort_by
          in: query
          schema:
            type: string
            description: Field to sort by (e.g., score, title, impact)
      responses:
        '200':
          description: List of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Risk'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Risks
      summary: Create a new risk
      operationId: createRisk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRiskInput'
      responses:
        '201':
          description: Risk created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /risks/{id}:
    get:
      tags:
        - Risks
      summary: Get risk details
      operationId: getRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Risk UUID
      responses:
        '200':
          description: Risk details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

    patch:
      tags:
        - Risks
      summary: Update risk
      operationId: updateRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRiskInput'
      responses:
        '200':
          description: Risk updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Risk'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

    delete:
      tags:
        - Risks
      summary: Delete risk
      operationId: deleteRisk
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Risk deleted
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  # ==================== MITIGATIONS ====================
  /risks/{id}/mitigations:
    post:
      tags:
        - Mitigations
      summary: Add mitigation to risk
      operationId: addMitigation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Risk UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMitigationInput'
      responses:
        '201':
          description: Mitigation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Risk not found

  /mitigations/{mitigationId}:
    patch:
      tags:
        - Mitigations
      summary: Update mitigation details
      operationId: updateMitigation
      security:
        - bearerAuth: []
      parameters:
        - name: mitigationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMitigationInput'
      responses:
        '200':
          description: Mitigation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  /mitigations/{mitigationId}/toggle:
    patch:
      tags:
        - Mitigations
      summary: Toggle mitigation status (PLANNED ↔ DONE)
      operationId: toggleMitigationStatus
      security:
        - bearerAuth: []
      parameters:
        - name: mitigationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mitigation'
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  # ==================== MITIGATION SUB-ACTIONS ====================
  /mitigations/{id}/subactions:
    post:
      tags:
        - Mitigations
      summary: Create mitigation sub-action (checklist item)
      operationId: createMitigationSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubActionInput'
      responses:
        '201':
          description: Sub-action created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MitigationSubAction'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Mitigation not found

  /mitigations/{id}/subactions/{subactionId}/toggle:
    patch:
      tags:
        - Mitigations
      summary: Toggle sub-action completed status
      operationId: toggleSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
        - name: subactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Sub-action UUID
      responses:
        '200':
          description: Sub-action toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MitigationSubAction'
        '401':
          description: Unauthorized
        '404':
          description: Sub-action not found

  /mitigations/{id}/subactions/{subactionId}:
    delete:
      tags:
        - Mitigations
      summary: Delete mitigation sub-action
      operationId: deleteSubAction
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Mitigation UUID
        - name: subactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Sub-action UUID
      responses:
        '204':
          description: Sub-action deleted
        '401':
          description: Unauthorized
        '404':
          description: Sub-action not found

  /mitigations/recommended:
    get:
      tags:
        - Mitigations
      summary: Get recommended mitigations (sorted by SPP score)
      operationId: getRecommendedMitigations
      responses:
        '200':
          description: Recommended mitigations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mitigation'

  # ==================== COMPLIANCE (M1) ====================
  /compliance/catalogs:
    get:
      tags: [Compliance]
      summary: List regulatory control catalogs available to import (M2)
      description: >
        Static reference data (e.g. ISO 27001:2022's 93 Annex A controls) that can be
        bulk-imported into a tenant's own framework via POST
        /compliance/frameworks/{frameworkId}/import-catalog. Includes catalogs that are
        registered but not yet available (control_count: 0, available: false) so clients can
        show them as "coming soon" — see ROADMAP.md M2 for why COBAC/BCEAO/ANSSI-CM aren't
        modeled yet.
      operationId: listComplianceCatalogs
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of catalogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceCatalogSummary'

  /compliance/frameworks/{frameworkId}/import-catalog:
    post:
      tags: [Compliance]
      summary: Bulk-import a regulatory catalog's controls into a framework (admin only, M2)
      description: >
        Idempotent — controls already present (matched by reference_code) are skipped, so
        calling this again after a catalog is extended only creates what's new.
      operationId: importComplianceCatalog
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportCatalogInput'
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCatalogResult'
        '400':
          description: Unknown catalog key, or the catalog is not yet available
        '403':
          description: Forbidden — only Admin can import a catalog (same tier as creating a framework)
        '404':
          description: Framework not found

  /compliance/frameworks:
    get:
      tags: [Compliance]
      summary: List global compliance frameworks
      operationId: listComplianceFrameworks
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceFramework'
    post:
      tags: [Compliance]
      summary: Create a global compliance framework (admin only)
      operationId: createComplianceFramework
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFrameworkInput'
      responses:
        '201':
          description: Framework created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceFramework'
        '400':
          description: Invalid input
        '403':
          description: Forbidden — only Admin can create a global framework
        '409':
          description: A framework with this name and version already exists

  /compliance/frameworks/{frameworkId}:
    get:
      tags: [Compliance]
      summary: Get a compliance framework
      operationId: getComplianceFramework
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Framework
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceFramework'
        '404':
          description: Framework not found
    delete:
      tags: [Compliance]
      summary: Delete a compliance framework
      description: >
        Removes the framework and the calling tenant's controls under it.
        Admin/root-only. Note the framework row is global — deleting it removes
        it for every tenant (a known multi-tenant limitation; in practice each
        tenant imports its own frameworks).
      operationId: deleteComplianceFramework
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Framework deleted
        '403':
          description: Insufficient permissions
        '404':
          description: Framework not found

  /compliance/frameworks/{frameworkId}/progress:
    get:
      tags: [Compliance]
      summary: Get a tenant's compliance progress for a framework
      operationId: getComplianceProgress
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProgress'

  /compliance/frameworks/{frameworkId}/report:
    get:
      tags: [Compliance]
      summary: Download an official compliance report (PDF) for a framework
      description: >
        Generates, in a single click, a print-ready PDF compliance report for the
        framework: cover identity (organization, framework, date, requester), an
        executive summary (compliance %, per-status breakdown) and a detailed,
        paginated controls table (reference, name, status, evidence count, source
        citation). All data is strictly tenant-scoped — the framework is global
        but only the requesting tenant's controls and evidence appear. Suitable
        for COBAC/BCEAO/ISO one-click statements.
      operationId: generateComplianceReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: locale
          in: query
          required: false
          description: Fixed-label language of the report. Defaults to French.
          schema: { type: string, enum: [fr, en], default: fr }
      responses:
        '200':
          description: The compliance report as a PDF attachment.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          description: Framework not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /compliance/frameworks/{frameworkId}/controls:
    get:
      tags: [Compliance]
      summary: List a tenant's controls for a framework
      operationId: listComplianceControls
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of controls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceControl'
    post:
      tags: [Compliance]
      summary: Instantiate a control for a tenant under this framework
      operationId: createComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: frameworkId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateControlInput'
      responses:
        '201':
          description: Control created (status defaults to not_implemented)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '400':
          description: Invalid input
        '404':
          description: Framework not found
        '409':
          description: A control with this reference_code already exists for this tenant+framework

  /compliance/controls/{controlId}:
    get:
      tags: [Compliance]
      summary: Get a control
      operationId: getComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Control
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '404':
          description: Control not found
    patch:
      tags: [Compliance]
      summary: Update a control (notably its implementation status)
      operationId: updateComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateControlInput'
      responses:
        '200':
          description: Control updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceControl'
        '400':
          description: Invalid status value
        '404':
          description: Control not found
    delete:
      tags: [Compliance]
      summary: Delete a control (admin only)
      operationId: deleteComplianceControl
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Control deleted
        '403':
          description: Forbidden — Delete is admin-only
        '404':
          description: Control not found

  /compliance/controls/{controlId}/evidences:
    get:
      tags: [Compliance]
      summary: List evidence attached to a control
      operationId: listComplianceEvidences
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of evidence
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ControlEvidence'
    post:
      tags: [Compliance]
      summary: Upload a file as evidence for a control
      operationId: createComplianceEvidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: controlId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        '201':
          description: Evidence uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlEvidence'
        '400':
          description: Missing file
        '404':
          description: Control not found

  /compliance/evidences/{evidenceId}/download:
    get:
      tags: [Compliance]
      summary: Download an evidence file
      description: |
        The only path to evidence file content — there is no public/static
        URL. Tenant ownership is re-verified on every call.
      operationId: downloadComplianceEvidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: evidenceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Evidence not found

  /compliance/evidences/{evidenceId}:
    delete:
      tags: [Compliance]
      summary: Delete an evidence record and its file (admin only)
      operationId: deleteComplianceEvidence
      security: [{ bearerAuth: [] }]
      parameters:
        - name: evidenceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Evidence deleted
        '403':
          description: Forbidden — Delete is admin-only
        '404':
          description: Evidence not found

  # ==================== BOARD REPORT (M4) ====================
  /reports/board:
    get:
      tags: [BoardReport]
      summary: List a tenant's board reports (most recent first)
      operationId: listBoardReports
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The tenant's board reports.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BoardReport' }
    post:
      tags: [BoardReport]
      summary: Generate a monthly board report (draft)
      description: >
        Aggregates the tenant's risk register (by criticality) and compliance
        posture (per framework), estimates the annual financial exposure in FCFA,
        and asks the configured AI advisor to write a non-technical narrative for
        the board of directors. When ANTHROPIC_API_KEY is set a Claude advisor
        (claude-opus-4-8) writes the prose; otherwise, or on any API error, a
        deterministic template writes it (GeneratedByModel records which). The
        report is created as an editable DRAFT (human-in-the-loop) and must be
        approved before diffusion.
      operationId: generateBoardReport
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateBoardReportInput' }
      responses:
        '201':
          description: The generated draft report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BoardReport' }

  /reports/board/{reportId}:
    get:
      tags: [BoardReport]
      summary: Get a board report (JSON)
      operationId: getBoardReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The board report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BoardReport' }
        '404':
          description: Report not found.
    patch:
      tags: [BoardReport]
      summary: Edit a draft board report's narrative
      description: Only DRAFT reports are editable; an approved report is frozen (returns 400/validation).
      operationId: updateBoardReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBoardReportInput' }
      responses:
        '200':
          description: The updated report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BoardReport' }
        '404':
          description: Report not found.
    delete:
      tags: [BoardReport]
      summary: Delete a board report
      operationId: deleteBoardReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Report deleted.
        '404':
          description: Report not found.

  /reports/board/{reportId}/approve:
    post:
      tags: [BoardReport]
      summary: Approve a draft board report (human-in-the-loop)
      description: Marks the report approved, recording the approver and timestamp. Idempotent.
      operationId: approveBoardReport
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The approved report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BoardReport' }
        '404':
          description: Report not found.

  /reports/board/{reportId}/pdf:
    get:
      tags: [BoardReport]
      summary: Download a board report as a polished PDF
      operationId: downloadBoardReportPDF
      security: [{ bearerAuth: [] }]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The board report as a PDF attachment.
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          description: Report not found.

  # ==================== ASSETS ====================
  /assets:
    get:
      tags:
        - Assets
      summary: List all assets
      operationId: listAssets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
        '401':
          description: Unauthorized

    post:
      tags:
        - Assets
      summary: Create asset
      operationId: createAsset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetInput'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized

  /assets/{id}:
    get:
      tags:
        - Assets
      summary: Get asset by ID
      operationId: getAsset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          description: Asset not found

    patch:
      tags:
        - Assets
      summary: Update asset
      operationId: updateAsset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetInput'
      responses:
        '200':
          description: Asset updated. If criticality changed, every linked
            risk's score is recalculated asynchronously by the Score Engine
            worker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Invalid input
        '404':
          description: Asset not found

    delete:
      tags:
        - Assets
      summary: Delete asset
      operationId: deleteAsset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Asset deleted
        '404':
          description: Asset not found

  /assets/{id}/history:
    get:
      tags:
        - Assets
      summary: Get asset history (snapshots taken before each update/delete)
      operationId: getAssetHistory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset history, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetSnapshot'
        '404':
          description: Asset not found

  # ==================== ASSET DEPENDENCIES ====================
  /asset-dependencies:
    get:
      tags:
        - Assets
      summary: List the tenant's asset dependency graph (every directed edge)
      operationId: listAssetDependencies
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All dependency edges for the tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetDependency'
        '401':
          description: Unauthorized

    post:
      tags:
        - Assets
      summary: Add a directed dependency edge (source depends on target)
      operationId: createAssetDependency
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetDependencyInput'
      responses:
        '201':
          description: Dependency created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDependency'
        '400':
          description: Invalid input (self-reference, unknown type, ...)
        '404':
          description: Source or target asset not found in this tenant
        '409':
          description: Identical edge already exists

  /asset-dependencies/{id}:
    delete:
      tags:
        - Assets
      summary: Delete a dependency edge
      operationId: deleteAssetDependency
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Dependency deleted
        '404':
          description: Dependency not found

  # ==================== STATISTICS ====================
  /stats:
    get:
      tags:
        - Statistics
      summary: Get dashboard statistics
      operationId: getDashboardStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Unauthorized

  /stats/risk-matrix:
    get:
      tags:
        - Statistics
      summary: Get risk matrix data (impact vs probability)
      operationId: getRiskMatrix
      responses:
        '200':
          description: Risk matrix data
          content:
            application/json:
              schema:
                type: object
                properties:
                  matrix:
                    type: object

  /stats/trends:
    get:
      tags:
        - Statistics
      summary: Get global risk trend
      operationId: getRiskTrend
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Risk trend data
          content:
            application/json:
              schema:
                type: object

  # ==================== EXPORT ====================
  /export/pdf:
    get:
      tags:
        - Export
      summary: Export risks to PDF
      operationId: exportPDF
      security:
        - bearerAuth: []
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized

  # ==================== GAMIFICATION ====================
  /gamification/me:
    get:
      tags:
        - Gamification
      summary: Get current user's gamification profile
      operationId: getGamificationProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Gamification profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamificationProfile'
        '401':
          description: Unauthorized

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token. Obtain via /auth/login

  schemas:
    # ========== INPUT SCHEMAS ==========
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          example: password123

    CreateRiskInput:
      type: object
      required:
        - title
        - impact
        - probability
      properties:
        title:
          type: string
          minLength: 3
          example: "Data breach risk"
        description:
          type: string
          example: "Unauthorized access to sensitive customer data"
        impact:
          type: integer
          minimum: 1
          maximum: 5
          description: Impact level (1-5)
          example: 5
        probability:
          type: integer
          minimum: 1
          maximum: 5
          description: Probability level (1-5)
          example: 3
        tags:
          type: array
          items:
            type: string
          example: ["security", "data-protection"]
        asset_ids:
          type: array
          items:
            type: string
            format: uuid
        framework:
          type: string
          enum: [ISO27001, CIS, NIST, OWASP]
          example: ISO27001

    UpdateRiskInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        impact:
          type: integer
          minimum: 1
          maximum: 5
        probability:
          type: integer
          minimum: 1
          maximum: 5
        tags:
          type: array
          items:
            type: string
        asset_ids:
          type: array
          items:
            type: string
            format: uuid

    CreateMitigationInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 3
          example: "Implement encryption"
        assignee:
          type: string
          example: "security-team@example.com"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          example: 50
        cost:
          type: string
          example: "High"
        mitigation_time:
          type: string
          example: "2025-12-31"
        due_date:
          type: string
          format: date
          example: "2025-12-31"

    UpdateMitigationInput:
      type: object
      properties:
        title:
          type: string
        assignee:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        cost:
          type: string
        mitigation_time:
          type: string
        due_date:
          type: string
          format: date

    CreateSubActionInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          example: "Install security patches"

    CreateAssetInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: "Production Database Server"
        type:
          type: string
          enum: [Server, Application, Cloud, Database, SaaS, Storage, Network, Laptop, Data, User, Supplier]
          example: Database
        criticality:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          example: CRITICAL
        owner:
          type: string
          example: "DBA Team"
        external_id:
          type: string
          example: "db-prod-001"

    UpdateAssetInput:
      type: object
      description: Partial update — omitted fields are left unchanged.
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [Server, Application, Cloud, Database, SaaS, Storage, Network, Laptop, Data, User, Supplier]
        criticality:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        owner:
          type: string

    # ========== RESPONSE SCHEMAS ==========
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [ADMIN, ANALYST, VIEWER]
        avatar_url:
          type: string
          format: uri
        last_login:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Risk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        impact:
          type: integer
          minimum: 1
          maximum: 5
        probability:
          type: integer
          minimum: 1
          maximum: 5
        score:
          type: number
          format: float
          description: Calculated risk score
        status:
          type: string
          enum: [OPEN, MITIGATED, ACCEPTED, CLOSED]
        framework:
          type: string
          enum: [ISO27001, CIS, NIST, OWASP]
        tags:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        mitigations:
          type: array
          items:
            $ref: '#/components/schemas/Mitigation'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Mitigation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        risk_id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [PLANNED, IN_PROGRESS, DONE]
        assignee:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        cost:
          type: string
        mitigation_time:
          type: string
        due_date:
          type: string
          format: date
        sub_actions:
          type: array
          items:
            $ref: '#/components/schemas/MitigationSubAction'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MitigationSubAction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mitigation_id:
          type: string
          format: uuid
        title:
          type: string
        completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ComplianceFramework:
      type: object
      description: Tenant-scoped framework a tenant tracks, e.g. ISO 27001, COBAC. Each tenant owns its own.
      required: [id, tenant_id, name, version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateFrameworkInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string

    ComplianceControl:
      type: object
      description: Tenant-scoped control instantiated under a global framework.
      required: [id, tenant_id, framework_id, reference_code, name, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        framework_id:
          type: string
          format: uuid
        reference_code:
          type: string
          example: A.5.1.1
        name:
          type: string
        description:
          type: string
        source_reference:
          type: string
          description: >
            Citation for where this control comes from (standard section, circular article,
            law) — populated on catalog-imported controls, optional for ad-hoc ones.
          example: "ISO/IEC 27001:2022, Annexe A, A.5.1"
        status:
          type: string
          enum: [not_implemented, in_progress, implemented, not_applicable]
        evidence_count:
          type: integer
          description: >
            Computed count of the control's active evidences. Returned by the
            list/get endpoints so the UI can badge substantiated controls and
            enforce the "no implemented status without a proof" rule.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateControlInput:
      type: object
      required: [name]
      properties:
        reference_code:
          type: string
        name:
          type: string
        description:
          type: string
        source_reference:
          type: string

    UpdateControlInput:
      type: object
      description: Partial update — omitted fields are left unchanged.
      properties:
        reference_code:
          type: string
        name:
          type: string
        description:
          type: string
        source_reference:
          type: string
        status:
          type: string
          enum: [not_implemented, in_progress, implemented, not_applicable]

    ComplianceCatalogSummary:
      type: object
      description: A regulatory control catalog available (or not yet available) for import.
      required: [key, name, available, control_count]
      properties:
        key:
          type: string
          example: iso27001-2022
        name:
          type: string
          example: ISO/IEC 27001
        version:
          type: string
          example: "2022"
        description:
          type: string
        available:
          type: boolean
          description: False for placeholder catalogs with no reviewed control content yet.
        control_count:
          type: integer

    ImportCatalogInput:
      type: object
      required: [catalog_key]
      properties:
        catalog_key:
          type: string
          example: iso27001-2022

    ImportCatalogResult:
      type: object
      required: [imported, skipped, total]
      properties:
        imported:
          type: integer
          description: Controls newly created by this call.
        skipped:
          type: integer
          description: Controls that already existed (matched by reference_code) and were left untouched.
        total:
          type: integer
          description: Total controls in the catalog.

    ControlEvidence:
      type: object
      description: Tenant-scoped evidence file attached to a control.
      required: [id, tenant_id, control_id, filename, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        control_id:
          type: string
          format: uuid
        filename:
          type: string
        description:
          type: string
        uploaded_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ComplianceProgress:
      type: object
      description: Computed, not persisted — tallies a tenant's controls for a framework by status.
      required: [framework_id, total, by_status, applicable, percent_complete]
      properties:
        framework_id:
          type: string
          format: uuid
        total:
          type: integer
        by_status:
          type: object
          additionalProperties:
            type: integer
          example: { not_implemented: 2, in_progress: 2, implemented: 4, not_applicable: 2 }
        applicable:
          type: integer
          description: total minus not_applicable
        percent_complete:
          type: number
          format: float
          description: implemented / applicable * 100 (0 if applicable is 0)

    FrameworkSnapshot:
      type: object
      description: Per-framework advancement frozen into a board report at generation time.
      properties:
        name: { type: string }
        version: { type: string }
        total: { type: integer }
        applicable: { type: integer, description: total minus not_applicable }
        implemented: { type: integer }
        percent_complete: { type: number, format: float }

    BoardReport:
      type: object
      description: >
        A tenant-scoped monthly board-of-directors report. Snapshots the risk and
        compliance posture at generation time plus an editable, non-technical
        narrative. Lifecycle: draft -> approved (human-in-the-loop).
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        title: { type: string }
        organization_name: { type: string, description: Organization display name snapshotted at generation time }
        period_label: { type: string, example: "Juillet 2026" }
        locale: { type: string, enum: [fr, en] }
        status: { type: string, enum: [draft, approved] }
        risks_critical: { type: integer }
        risks_high: { type: integer }
        risks_medium: { type: integer }
        risks_low: { type: integer }
        risks_total: { type: integer }
        financial_exposure_fcfa: { type: integer, format: int64, description: Estimated annual exposure in FCFA (order-of-magnitude model) }
        overall_compliance_percent: { type: number, format: float }
        frameworks_snapshot:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/FrameworkSnapshot' }
        executive_summary: { type: string }
        risk_commentary: { type: string }
        compliance_commentary: { type: string }
        financial_commentary: { type: string }
        recommendations:
          type: array
          items: { type: string }
        generated_by_model: { type: string, description: '"claude-opus-4-8" or "template" (provenance)' }
        created_by: { type: string, format: uuid }
        approved_by: { type: string, format: uuid, nullable: true }
        approved_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GenerateBoardReportInput:
      type: object
      description: Both fields optional — empty period defaults to the current month, empty locale to French.
      properties:
        period_label: { type: string, example: "Juillet 2026" }
        locale: { type: string, enum: [fr, en], default: fr }

    UpdateBoardReportInput:
      type: object
      description: Partial narrative edits for a DRAFT report. Any omitted field is left unchanged.
      properties:
        title: { type: string }
        executive_summary: { type: string }
        risk_commentary: { type: string }
        compliance_commentary: { type: string }
        financial_commentary: { type: string }
        recommendations:
          type: array
          items: { type: string }

    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [Server, Application, Cloud, Database, SaaS, Storage, Network, Laptop, Data, User, Supplier]
        criticality:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        owner:
          type: string
        source:
          type: string
          enum: [MANUAL, OPENASSET]
        external_id:
          type: string
        risks:
          type: array
          items:
            $ref: '#/components/schemas/Risk'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssetSnapshot:
      type: object
      description: An asset's state captured immediately before an update or deletion.
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        criticality:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        owner:
          type: string
        reason:
          type: string
          enum: [update, delete]
        created_at:
          type: string
          format: date-time

    AssetDependency:
      type: object
      description: >-
        A directed edge in the tenant's asset dependency graph:
        source_asset depends on target_asset (read "source <type> target").
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        source_asset_id:
          type: string
          format: uuid
        target_asset_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [depends_on, runs_on, connects_to, hosted_by, stores_data_in, authenticates_via, backs_up_to, managed_by]
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAssetDependencyInput:
      type: object
      required:
        - source_asset_id
        - target_asset_id
      properties:
        source_asset_id:
          type: string
          format: uuid
        target_asset_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [depends_on, runs_on, connects_to, hosted_by, stores_data_in, authenticates_via, backs_up_to, managed_by]
          default: depends_on
        description:
          type: string

    DashboardStats:
      type: object
      properties:
        total_risks:
          type: integer
        open_risks:
          type: integer
        mitigated_risks:
          type: integer
        accepted_risks:
          type: integer
        closed_risks:
          type: integer
        average_risk_score:
          type: number
          format: float
        critical_assets:
          type: integer
        recent_risks:
          type: array
          items:
            $ref: '#/components/schemas/Risk'

    GamificationProfile:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        points:
          type: integer
        level:
          type: integer
        badges:
          type: array
          items:
            type: object
            properties:
              name:
